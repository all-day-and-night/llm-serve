apiVersion: v1
kind: Pod
metadata:
  name: gpu-test
  namespace: llm-serve
spec:
  restartPolicy: Never
  nodeSelector:
    gpu-node: "true"
  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"
  containers:
    - name: cuda
      image: nvidia/cuda:12.4.1-base-ubuntu22.04
      command: ["nvidia-smi"]
      resources:
        limits:
          nvidia.com/gpu: 1
