apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: llm-serve
  labels:
    app: vllm
spec:
  type: ClusterIP
  selector:
    app: vllm
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
# 로컬 테스트용: kubectl port-forward svc/vllm -n llm-serve 8000:8000
# 외부 노출이 필요하면 scripts/40-port-forward.sh 또는 LoadBalancer 사용
