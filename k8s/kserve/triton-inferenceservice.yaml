# KServe InferenceService: Triton Inference Server
#
# KServe лӮҙмһҘ kserve-tritonserver ClusterServingRuntime мӮ¬мҡ©.
# storageUri pvc://: кё°мЎҙ triton-model-repository-pvcлҘј model repositoryлЎң л§ҲмҡҙнҠё.
#
# л№„көҗ:
#   k8s/triton/deployment.yaml  вҶ’ Tritonмқ„ м§Ғм ‘ DeploymentлЎң мҡҙмҳҒ
#   мқҙ нҢҢмқј                     вҶ’ KServe InferenceServiceлЎң мҡҙмҳҒ (v2 protocol н‘ңмӨҖнҷ”)
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: triton-trtllm
  namespace: llm-serve
  annotations:
    serving.kserve.io/deploymentMode: RawDeployment
spec:
  predictor:
    nodeSelector:
      gpu-node: "true"
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    model:
      modelFormat:
        name: triton
      storageUri: pvc://triton-model-repository-pvc  # k8s/triton/pvc.yaml мғқм„ұ н•„мҡ”
      resources:
        requests:
          cpu: "8"
          memory: 48Gi
          nvidia.com/gpu: 2
        limits:
          cpu: "16"
          memory: 96Gi
          nvidia.com/gpu: 2
