# ClusterServingRuntime: vLLM (GPU 2장, Tensor Parallelism)
#
# KServe 기본 제공 kserve-vllm 대신 TP=2 + GPU resource를 명시한 커스텀 런타임.
# InferenceService에서 spec.predictor.model.runtime: kserve-vllm-gpu2 로 참조.
#
# 동작 순서:
#   1. storage initializer가 storageUri(hf:// 또는 pvc://) 에서 /mnt/models 로 모델 다운로드
#   2. kserve-container가 /mnt/models 를 모델 경로로 vllm serve 실행
apiVersion: serving.kserve.io/v1alpha1
kind: ClusterServingRuntime
metadata:
  name: kserve-vllm-gpu2
spec:
  supportedModelFormats:
    - name: vllm
      version: "1"
      autoSelect: true
  protocolVersions:
    - v2
  containers:
    - name: kserve-container
      image: vllm/vllm-openai:v0.6.4
      command: ["vllm", "serve"]
      args:
        - /mnt/models           # storage initializer 다운로드 경로
        - --host=0.0.0.0
        - --port=8080
        - --tensor-parallel-size=2
        - --dtype=auto
        - --gpu-memory-utilization=0.90
        - --max-model-len=8192
      ports:
        - containerPort: 8080
          protocol: TCP
      readinessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 60
        periodSeconds: 10
        failureThreshold: 30
      livenessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 120
        periodSeconds: 30
        failureThreshold: 3
      resources:
        requests:
          cpu: "8"
          memory: 32Gi
          nvidia.com/gpu: 2
        limits:
          cpu: "16"
          memory: 64Gi
          nvidia.com/gpu: 2
      volumeMounts:
        - name: shm
          mountPath: /dev/shm
  volumes:
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 8Gi
