apiVersion: apps/v1
kind: Deployment
metadata:
  name: trtllm
  namespace: llm-serve
  labels:
    app: trtllm
spec:
  replicas: 1
  progressDeadlineSeconds: 1800  # 이미지 pull + TRT 엔진 빌드 포함 30분
  selector:
    matchLabels:
      app: trtllm
  template:
    metadata:
      labels:
        app: trtllm
    spec:
      nodeSelector:
        gpu-node: "true"
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      imagePullSecrets:
        - name: ngc-secret
      containers:
        - name: trtllm
          # NGC 로그인 필요: docker login nvcr.io -u '$oauthtoken' -p <NGC_API_KEY>
          # https://catalog.ngc.nvidia.com/orgs/nvidia/teams/tensorrt-llm/containers/release
          image: nvcr.io/nvidia/tensorrt-llm/release:0.20.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: LD_LIBRARY_PATH
              value: "/usr/local/tensorrt/targets/x86_64-linux-gnu/lib:/usr/local/tensorrt/lib:/usr/local/cuda/lib64:/usr/local/cuda/compat/lib.real:/usr/local/lib/python3.12/dist-packages/torch/lib:/usr/local/nvidia/lib:/usr/local/nvidia/lib64"
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: HF_TOKEN
                  optional: true
          command:
            - trtllm-serve
          args:
            - Qwen/Qwen2.5-7B-Instruct
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
            - --tp_size
            - "2"             # Tensor Parallel size = GPU 수
          resources:
            requests:
              cpu: "8"
              memory: 48Gi
              nvidia.com/gpu: 2
            limits:
              cpu: "16"
              memory: 96Gi
              nvidia.com/gpu: 2
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
            - name: model-cache
              mountPath: /root/.cache
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120  # TRT 엔진 빌드 시간 포함
            periodSeconds: 15
            failureThreshold: 40
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
        - name: model-cache
          emptyDir:
            sizeLimit: 300Gi
          # 운영 전환 시: 사전 빌드된 TRT engine을 S3/EFS에서 mount
          # 권장 구조: s3://bucket/trtllm-engines/qwen2.5-7b-tp2/
          #   rank0.engine, rank1.engine, config.json
          # initContainer로 aws s3 cp 후 본 컨테이너 기동
